services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: iris
      POSTGRES_PASSWORD: iris
      POSTGRES_DB: testdb
    command: >
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    ports:
      - "54321:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --set=redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 5s
      timeout: 5s
      retries: 10

  test:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.test
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      TEST_POSTGRES_DSN: postgres://iris:iris@postgres:5432/testdb
      TEST_KAFKA_BROKERS: redpanda:9092
      E2E_TEST: "1"
    command: go test ./tests/e2e/... -v -count=1
