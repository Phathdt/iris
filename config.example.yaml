# Iris CDC Pipeline Configuration
# PostgreSQL to Kafka Change Data Capture

source:
  type: postgres
  dsn: postgres://user:password@localhost:5432/mydb
  tables:
    - users
    - orders
  slot_name: iris_slot
  # start_lsn: ""  # Optional: start from specific WAL position

  # publication: pglogrepl_publication  # Optional: default "pglogrepl_publication"
  # ensure_publication: true            # Optional: default true
  # When true (default) and tables is non-empty, iris creates the publication
  # on start if missing, or runs ALTER PUBLICATION ... SET TABLE if the table
  # list differs from what's configured here. When tables is empty, iris only
  # verifies the publication exists (no all-tables auto-management).
  # Set ensure_publication: false to manage the publication yourself (e.g. via
  # a migration) — required if the CDC user lacks table-owner privileges.

transform:
  enabled: false
  type: wasm
  # Single transform (backward compatibility)
  path: ./transforms/filter.wasm
  # function_name: handle         # Optional: default is "handle"
  # alloc_function_name: alloc    # Optional: default is "alloc"
  # enable_logging: false         # Optional: enable host function logging

  # Multiple transforms (chain) - apply sequentially
  # modules:
  #   - path: ./filter.wasm
  #   - path: ./enrich.wasm
  #   - path: ./mask.wasm
  # When modules is specified, path is ignored

sink:
  # Option 1: Kafka sink (default)
  type: kafka
  brokers:
    - localhost:9092
  # Uses mapping.table_stream_map for topic routing (defaults to "cdc.{table}")
  # Optional outbox column shaping: derive key/topic/body from columns in
  # event.After (models Debezium Outbox Event Router). When omitted, the sink
  # keeps default behavior (key=table, topic=cdc.{table}, body=full envelope).
  # A missing/null/empty column falls back to that default per field.
  # outbox:
  #   key_field: aggregate_id   # Kafka message key (preserves per-aggregate ordering)
  #   route_field: event_type   # topic = value of this column (identity routing)
  #   payload_field: payload    # message body = JSON of this column

  # Option 2: Stdout sink (for debugging/development)
  # Writes CDC events as JSON to stdout
  # type: stdout
  # pretty_print: false             # Optional: pretty-print JSON output

  # Option 3: File sink (for logging to file)
  # Writes CDC events as JSON lines to a file with optional rotation
  # type: file
  # path: ./events.jsonl
  # max_size: 104857600            # Optional: rotate when file reaches 100MB
  # max_files: 5                   # Optional: keep up to 5 rotated files

# Mapping configuration (optional)
# Maps source tables to Kafka topic names
# Used by the kafka sink
# If omitted, defaults to "cdc.{table}"
# mapping:
#   table_stream_map:
#     users: cdc.users
#     orders: cdc.orders

# Dead Letter Queue (optional)
# Events failing transform or sink after retries are sent here
# dlq:
#   enabled: true
#   sink:
#     type: kafka
#     brokers:
#       - localhost:9092
#   # Note: The DLQ sink has no table mapping, so kafka events go to the
#   # default topic (cdc.{table}) unless mapping.table_stream_map is set.

# Retry configuration (optional)
# retry:
#   max_attempts: 3    # Default: 3
#   backoff_ms: 100    # Default: 100ms between retries

# Logger configuration (optional)
# If not specified, defaults to format: "text", level: "info"
logger:
  format: text    # Options: "text" (colored), "json", "plain" (no colors)
  level: info     # Options: "debug", "info", "warn", "error"

# Observability configuration (optional)
# observability:
#   metrics:
#     enabled: true
#     port: 9090           # Default: 9090
#     bind: "0.0.0.0"      # Default: 0.0.0.0 (all interfaces)
#   tracing:
#     enabled: false
#     endpoint: localhost:4317  # OTLP/gRPC endpoint
#     service_name: iris        # OTel service name
#     sample_rate: 1.0          # Trace sampling rate (0.0-1.0)
#     # Note: Uses insecure gRPC by default. For production with TLS,
#     # configure your OTLP collector endpoint accordingly.
