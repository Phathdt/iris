name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet ./...
      - run: gofmt -l . | tee /dev/stderr | (! read)

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go mod download
      - run: go test -short -timeout 60s -race ./pkg/... ./internal/...

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go mod download
      - run: go test -tags=integration -v -timeout 300s -run ^TestIntegration_ ./internal/...

  test-e2e:
    name: E2E Tests (Postgres WAL + Redpanda)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f tests/e2e/docker-compose.yml up --build --abort-on-container-exit --exit-code-from test
      - if: always()
        run: docker compose -f tests/e2e/docker-compose.yml down -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build -o bin/iris ./cmd/iris
